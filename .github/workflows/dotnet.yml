name: .NET

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      categories:
        description: Categories to run
        type: string
        required: false
      publish-packages:
        description: Publish packages?
        type: boolean
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  modularpipeline:
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Pull Requests' }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free Disk Space (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Dev Drive (Windows)
        if: matrix.os == 'windows-latest'
        uses: samypr100/setup-dev-drive@v4
        with:
          drive-size: 10GB
          trusted-dev-drive: true
          env-mapping: |
            NUGET_PACKAGES,{{ DEV_DRIVE }}/.nuget/packages
            TEMP,{{ DEV_DRIVE }}/tmp
            TMP,{{ DEV_DRIVE }}/tmp

      - name: Check for .received.txt files
        shell: bash
        run: |
          if find . -name "*.received.txt" -not -path "./node_modules/*" | grep -q .; then
            echo "ERROR: .received.txt files found. These should not be committed."
            echo "Please replace them with .verified.txt files or remove them."
            find . -name "*.received.txt" -not -path "./node_modules/*"
            exit 1
          fi

      - name: Setup .NET Framework
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/package.json', '**/Directory.Packages.props') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Enable Long Paths on Windows
        if: matrix.os == 'windows-latest'
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
        shell: pwsh

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      # Export GitVersion outputs as env vars. MSBuild auto-binds env vars whose name
      # matches a property to a global property, so every subsequent dotnet build/publish/
      # pack/test in this job — including ones launched by TUnit.Pipeline — stamps the
      # correct AssemblyVersion/FileVersion even on AOT recompiles. Without this, a
      # publish that triggers a recompile drops AssemblyVersion to 1.0.0.0, and any
      # following `pack --no-build` ships a strong-name-mismatched package (issue #5622).
      - name: Export version env vars
        shell: bash
        run: |
          {
            echo "Version=${{ steps.gitversion.outputs.semVer }}"
            echo "AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }}"
            echo "FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }}"
            echo "InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}"
            echo "PackageVersion=${{ steps.gitversion.outputs.fullSemVer }}"
          } >> "$GITHUB_ENV"

      - name: Restore
        shell: bash
        run: dotnet restore TUnit.CI.slnx

      - name: Build
        shell: bash
        run: >-
          dotnet build TUnit.CI.slnx -c Release --no-restore -graphBuild:True
          "-p:Version=${{ steps.gitversion.outputs.semVer }}"
          "-p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }}"
          "-p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }}"
          "-p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}"
          "-p:PackageVersion=${{ steps.gitversion.outputs.fullSemVer }}"

      - name: Publish AOT
        shell: bash
        run: >-
          dotnet publish TUnit.TestProject/TUnit.TestProject.csproj -c Release
          --use-current-runtime -p:Aot=true -o TESTPROJECT_AOT --framework net10.0
          "-p:Version=${{ steps.gitversion.outputs.semVer }}"
          "-p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }}"
          "-p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }}"
          "-p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}"
          "-p:PackageVersion=${{ steps.gitversion.outputs.fullSemVer }}"

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Run Pipeline
        uses: ./.github/actions/execute-pipeline
        with:
          admin-token: ${{ secrets.ADMIN_TOKEN }}
          environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
          nuget-apikey: ${{ secrets.NUGET__APIKEY }}
          publish-packages: ${{ (github.event.inputs.publish-packages || false) && matrix.os == 'ubuntu-latest' }}

      - name: Upload Diagnostic Logs
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: TestingPlatformDiagnosticLogs${{matrix.os}}
          path: '**/log_*.diag'

      - name: Upload Hang Dumps
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: HangDump${{matrix.os}}
          path: '**/hangdump*'

      - name: NuGet Packages Artifacts
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: 'NuGetPackages-${{matrix.os}}'
          path: '**/*.*nupkg'
